<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #1e64eb;
            /* Фон с характерным паттерном */
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            font-family: 'Lilita One', cursive;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Верхняя плашка выбора языка */
        .lang-header {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
        }

        .lang-selector {
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Логотип (взят официальный PNG) */
        .logo {
            width: 260px;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        /* Тот самый эффект шрифта Brawl Stars: жирная обводка + тень */
        .bs-text {
            line-height: 1.1;
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000,
                 0px  5px 0px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        /* Желтая кнопка с эффектом 3D */
        .btn-yellow {
            background: #ffcc00;
            border: 4px solid #000;
            border-radius: 12px;
            padding: 14px 45px;
            color: white;
            font-size: 22px;
            text-decoration: none;
            display: inline-block;
            box-shadow: inset 0 -6px 0 #c69e00, 0 6px 15px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 50px;
            transition: 0.1s;
        }

        .btn-yellow:active {
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 #c69e00;
        }

        /* Текст скачивания */
        .download-title {
            font-size: 20px;
            margin-bottom: 15px;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        /* Кнопка Google Play (Русская версия) */
        .gp-btn img {
            width: 220px;
            border-radius: 8px;
        }

        /* Футер как в оригинале */
        footer {
            background-color: #000;
            padding: 25px 10px;
            display: flex;
            justify-content: space-around;
            font-family: Arial, sans-serif; /* В футере шрифт обычный */
        }

        footer a {
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            max-width: 110px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="lang-header">
        <div class="lang-selector">🌐 русский ⌵</div>
    </div>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/b8/Brawl_Stars_logo.png" alt="Brawl Stars" class="logo">

        <div class="bs-text">Получите награду в Brawl Stars!</div>

        <a href="https://link.brawlstars.com/ru" class="btn-yellow">
            Получить награду
        </a>

        <div class="download-title">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-btn">
            <img src="https://textoverimage.com/wp-content/uploads/2021/04/google-play-badge-russian.png" alt="Google Play">
        </a>
    </div>

    <footer>
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </footer>

</body>
  </html>
