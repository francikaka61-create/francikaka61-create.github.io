<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Награда</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bs-blue: #3267ff;
            --bs-yellow: #ffcc00;
            --bs-black: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lilita One', cursive;
            background: linear-gradient(180deg, #2e5fff 0%, #3e70ff 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Фоновый узор */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 180px;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        /* Шапка */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
            position: relative;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        /* Контент */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }

        /* Логотип */
        .logo {
            width: 270px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 6px 0 rgba(0,0,0,0.1));
        }

        .title {
            font-size: 30px;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 35px;
            text-shadow: 
                -2px -2px 0 var(--bs-black),  
                 2px -2px 0 var(--bs-black),
                -2px  2px 0 var(--bs-black),
                 2px  2px 0 var(--bs-black),
                 2px  0px 0 var(--bs-black),
                -2px  0px 0 var(--bs-black),
                 0px  2px 0 var(--bs-black),
                 0px -2px 0 var(--bs-black),
                 0px  5px 0 var(--bs-black);
        }

        /* === ИСПРАВЛЕННАЯ КНОПКА === */
        .claim-button {
            width: 100%;
            background: var(--bs-yellow);
            border: 3px solid var(--bs-black); /* Сделали тоньше, как в оригинале */
            border-radius: 8px; /* Более острые углы */
            padding: 16px 10px;
            font-family: 'Lilita One', cursive;
            font-size: 26px;
            color: white;
            cursor: pointer;
            text-shadow: 
                -2px -2px 0 var(--bs-black),  
                 2px -2px 0 var(--bs-black),
                -2px  2px 0 var(--bs-black),
                 2px  2px 0 var(--bs-black),
                 0px  3px 0 var(--bs-black);
            box-shadow: 
                inset 0 -6px 0 rgba(0,0,0,0.2), /* Внутреннее затемнение */
                0 6px 0 var(--bs-black); /* Черный объем */
            margin-bottom: 60px;
            /* ФИРМЕННЫЙ СКОС BRAWL STARS: */
            transform: skewX(-4deg); 
            transition: transform 0.05s, box-shadow 0.05s;
        }

        /* Выравниваем текст обратно, чтобы он не был наклонным */
        .claim-button span {
            display: block;
            transform: skewX(4deg);
        }

        .claim-button:active {
            /* При нажатии сохраняем скос и опускаем кнопку */
            transform: skewX(-4deg) translateY(4px);
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), 0 2px 0 var(--bs-black);
        }
        /* ============================ */

        .download-label {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 
                -2px -2px 0 var(--bs-black),  
                 2px -2px 0 var(--bs-black),
                -2px  2px 0 var(--bs-black),
                 2px  2px 0 var(--bs-black),
                 0px  3px 0 var(--bs-black);
        }

        .gp-link {
            display: inline-block;
            transition: transform 0.2s;
        }

        .gp-link:active {
            transform: scale(0.95);
        }

        .gp-link img {
            width: 210px;
            height: auto;
        }

        .footer {
            background: #000;
            width: 100%;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 11px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-btn">🌐 русский ⌄</div>
    </div>

    <div class="main-content">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars Logo" class="logo">

        <div class="title">
            ПОЛУЧИТЕ НАГРАДУ В <br> BRAWL STARS!
        </div>

        <button class="claim-button">
            <span>Получить награду</span>
        </button>

        <div class="download-label">Скачать Brawl Stars</div>
        
        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Скачать в Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </div>

</body>
</html>
