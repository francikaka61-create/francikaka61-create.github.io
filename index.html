<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bs-blue: #3267ff;
            --bs-yellow: #ffcc00;
            --bs-outline: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lilita One', cursive;
            background: linear-gradient(180deg, #2e5fff 0%, #3e70ff 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Фоновый паттерн с иконками */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 180px;
            opacity: 0.12;
            z-index: 0;
        }

        /* Кнопка выбора языка */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
            position: relative;
            z-index: 10;
        }

        .lang-picker {
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            padding: 5px 15px;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Основной контейнер */
        .content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: 360px;
            padding-bottom: 40px;
        }

        /* Логотип */
        .logo {
            width: 280px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 6px 0 rgba(0,0,0,0.15));
        }

        /* Жирный текст с правильной обводкой (Brawl Style) */
        .main-title {
            font-size: 28px;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 35px;
            padding: 0 10px;
            /* Многослойная тень для идеально ровной и жирной обводки */
            text-shadow: 
                -2px -2px 0 var(--bs-outline),  
                 2px -2px 0 var(--bs-outline),
                -2px  2px 0 var(--bs-outline),
                 2px  2px 0 var(--bs-outline),
                 0px  4px 0 var(--bs-outline),
                 0px  5px 0 var(--bs-outline);
        }

        /* Кнопка "Получить награду" */
        .claim-btn {
            width: 90%;
            max-width: 320px;
            background: var(--bs-yellow);
            border: 4px solid var(--bs-outline);
            border-radius: 14px;
            padding: 16px 10px;
            font-family: 'Lilita One', cursive;
            font-size: 26px;
            color: white;
            cursor: pointer;
            text-transform: none;
            /* Обводка текста внутри кнопки */
            text-shadow: 
                -2px -2px 0 var(--bs-outline),  
                 2px -2px 0 var(--bs-outline),
                -2px  2px 0 var(--bs-outline),
                 2px  2px 0 var(--bs-outline),
                 0px  3px 0 var(--bs-outline);
            /* Внешняя тень кнопки (3D эффект) */
            box-shadow: 
                inset 0 -8px 0 rgba(0,0,0,0.25),
                0 8px 0 var(--bs-outline);
            margin-bottom: 60px;
            transition: transform 0.05s;
        }

        .claim-btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), 0 4px 0 var(--bs-outline);
        }

        /* Секция загрузки */
        .download-text {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 
                -2px -2px 0 var(--bs-outline),  
                 2px -2px 0 var(--bs-outline),
                -2px  2px 0 var(--bs-outline),
                 2px  2px 0 var(--bs-outline),
                 0px  3px 0 var(--bs-outline);
        }

        .gp-link img {
            width: 200px;
            height: auto;
        }

        /* Футер */
        .footer {
            background: #000;
            width: 100%;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            font-size: 10px;
            opacity: 0.8;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-picker">
            <span>🌐</span> русский <span>⌄</span>
        </div>
    </div>

    <div class="content">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars" class="logo">

        <div class="main-title">
            Получите награду в <br> Brawl Stars!
        </div>

        <button class="claim-btn">Получить награду</button>

        <div class="download-text">Скачать Brawl Stars</div>
        
        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </div>

</body>
              </html>
