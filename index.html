<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lilita One', cursive;
            background: linear-gradient(180deg, #2f5fff, #3d6eff);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Фоновый паттерн с иконками */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 200px;
            opacity: 0.15;
            z-index: 0;
        }

        /* Шапка с выбором языка */
        .header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
        }

        .lang {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.4);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* Контент */
        .main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* ЛОГОТИП (твоя ссылка) */
        .logo {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        /* Текст с жирной обводкой */
        .title {
            font-size: 28px;
            line-height: 1.1;
            margin-bottom: 30px;
            max-width: 300px;
            text-transform: none;
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000,
                 0px  4px 0 #000;
        }

        /* Кнопка в стиле Brawl Stars */
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            font-size: 26px;
            background: #ffcc00;
            border: 4px solid #000;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 
                inset 0 -8px 0 rgba(0,0,0,0.25),
                0 6px 0 #000;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            margin-bottom: 50px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), 0 2px 0 #000;
        }

        /* Секция скачивания */
        .download-text {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
        }

        .gp-link img {
            width: 200px;
            height: auto;
        }

        /* Футер */
        .footer {
            position: relative;
            z-index: 1;
            background: #000;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-size: 11px;
            opacity: 0.9;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang">🌐 русский ⌄</div>
    </div>

    <div class="main">
        <img class="logo" src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars">

        <div class="title">
            Получите награду в Brawl Stars!
        </div>

        <div class="btn">Получить награду</div>

        <div class="download-text">Скачать Brawl Stars</div>
        
        <a href="#" class="gp-link">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </div>

</body>
</html>
