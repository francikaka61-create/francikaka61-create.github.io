<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Lilita One',cursive;
    background: linear-gradient(#2d5bff, #3a6cff);
    color:white;
    text-align:center;
}

/* ФОН (похож на оригинал) */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:url("https://cdn.brawlify.com/images/bg-stars.png");
    opacity:0.12;
}

/* ЯЗЫК */
.lang {
    position:absolute;
    right:15px;
    top:15px;
    background:rgba(0,0,0,0.3);
    border:2px solid rgba(255,255,255,0.6);
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
}

/* КОНТЕНТ */
.wrap {
    max-width:420px;
    margin:auto;
    padding-top:60px;
}

/* ЛОГО (НЕ КЛИКАБЕЛЬНО) */
.logo {
    width:280px;
    pointer-events:none;
}

/* ТЕКСТ */
.title {
    font-size:26px;
    margin:25px 0;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

/* КНОПКА */
.btn {
    display:block;
    width:90%;
    margin:0 auto 50px;
    padding:18px;
    font-size:24px;

    background:#ffcc00;
    border:5px solid #000;
    border-radius:16px;

    box-shadow:
        inset 0 -8px 0 rgba(0,0,0,0.25),
        0 8px 0 #000;

    color:white;
    text-decoration:none;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

.btn:active {
    transform:translateY(6px);
    box-shadow:
        inset 0 -4px 0 rgba(0,0,0,0.25),
        0 2px 0 #000;
}

/* Скачать */
.download {
    font-size:22px;
    margin-bottom:15px;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

/* Google Play */
.gp {
    width:220px;
}

/* ФУТЕР */
footer {
    margin-top:50px;
    background:#000;
    padding:20px 10px;
    display:flex;
    justify-content:center;
    gap:20px;
}

footer a {
    color:white;
    font-size:10px;
    text-decoration:none;
    font-family:sans-serif;
    text-transform:uppercase;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="lang">🌐 русский ⌄</div>

<div class="wrap">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/6/62/Brawl_Stars_logo.svg/512px-Brawl_Stars_logo.svg.png">

<div class="title">
Получите награду в Brawl Stars!
</div>

<a href="#" class="btn">Получить награду</a>

<div class="download">Скачать Brawl Stars</div>

<img class="gp" src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png">

</div>

<footer>
<a href="#">Справочник для родителей</a>
<a href="#">Условия пользования</a>
<a href="#">Политика конфиденциальности</a>
</footer>

</body>
</html>
