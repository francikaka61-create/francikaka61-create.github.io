<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Получить награду</title>
    <style>
        /* Основные стили страницы */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif; /* В оригинале используется шрифт Lilita One */
            background-color: #1e64eb; /* Синий фон */
            /* Здесь можно добавить фоновый паттерн с иконками */
            background-image: url('https://path-to-your-pattern-image.png'); 
            background-size: cover;
            color: white;
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Логотип */
        .logo {
            max-width: 280px;
            margin-bottom: 30px;
        }

        /* Заголовок */
        h1 {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            max-width: 300px;
        }

        /* Желтая кнопка "Получить награду" */
        .btn-reward {
            background-color: #ffcc00;
            color: #000;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 12px;
            border: 3px solid #000;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.2), 0 4px 0 #9c7c00;
            transition: transform 0.1s;
            display: inline-block;
            margin-bottom: 50px;
        }

        .btn-reward:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Текст скачивания */
        .download-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Кнопка Google Play */
        .google-play-btn img {
            width: 200px;
            border-radius: 8px;
        }

        /* Футер */
        footer {
            background-color: #000;
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
        }

        footer a {
            color: white;
            text-decoration: none;
            text-align: center;
            max-width: 100px;
        }

        /* Языковая панель сверху */
        .lang-bar {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: flex-end;
            box-sizing: border-box;
        }

        .lang-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="lang-bar">
        <div class="lang-select">🌐 русский ⌵</div>
    </div>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/b8/Brawl_Stars_logo.png" alt="Brawl Stars" class="logo">

        <h1>Получите награду в Brawl Stars!</h1>

        <a href="#" class="btn-reward">Получить награду</a>

        <div class="download-text">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="google-play-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Скачать из Google Play">
        </a>
    </div>

    <footer>
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </footer>

</body>
</html>
