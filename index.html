<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Награда</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            /* Убираем выделение при нажатии на мобилках */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lilita One', cursive, sans-serif;
            background: linear-gradient(180deg, #2f5fff 0%, #3d6eff 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Фоновый паттерн */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 160px;
            opacity: 0.15;
            z-index: 0;
        }

        /* Выбор языка */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px;
            position: relative;
            z-index: 2;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            flex: 1;
            justify-content: center;
        }

        /* ЛОГОТИП */
        .logo {
            width: 260px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 6px 0 rgba(0,0,0,0.2));
        }

        /* ЗАГОЛОВОК - ИСПРАВЛЕННЫЕ ШРИФТЫ И ТЕНИ */
        .title {
            font-size: 32px;
            margin-bottom: 40px;
            line-height: 1.1;
            /* Идеально ровная обводка */
            -webkit-text-stroke: 2px black;
            /* Тень для объема вниз */
            text-shadow: 0px 4px 0px #000;
        }

        /* КНОПКА - ПОЛНОЕ СООТВЕТСТВИЕ ОРИГИНАЛУ */
        .btn-claim {
            width: 100%;
            background: #ffcc00;
            border: 4px solid #000;
            border-radius: 14px;
            padding: 16px;
            font-family: 'Lilita One', cursive;
            font-size: 28px;
            color: white;
            cursor: pointer;
            /* Обводка текста на кнопке */
            -webkit-text-stroke: 1.5px black;
            text-shadow: 0px 3px 0px #000;
            /* Тень самой кнопки */
            box-shadow: 
                inset 0 -8px 0 rgba(0,0,0,0.2),
                0 6px 0 #000;
            margin-bottom: 60px;
        }

        .btn-claim:active {
            transform: translateY(3px);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 3px 0 #000;
        }

        /* СКАЧАТЬ */
        .download-title {
            font-size: 24px;
            margin-bottom: 15px;
            -webkit-text-stroke: 1.5px black;
            text-shadow: 0px 3px 0px #000;
        }

        .gp-badge img {
            width: 200px;
            display: block;
        }

        /* ФУТЕР */
        .footer {
            background: #000;
            width: 100%;
            padding: 30px 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            z-index: 2;
        }

        .footer a {
            color: #ccc;
            text-decoration: none;
            font-size: 10px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-btn">🌐 русский ⌄</div>
    </div>

    <div class="container">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars" class="logo">

        <div class="title">
            ПОЛУЧИТЕ НАГРАДУ В BRAWL STARS!
        </div>

        <button class="btn-claim">Получить награду</button>

        <div class="download-title">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-badge" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </div>

</body>
</html>
