<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Награда</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-blue: #2c59ec; /* Идеальный синий оттенок оригинала */
            --btn-yellow: #fdd023;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Lilita One', cursive;
            background-color: var(--bg-blue);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Восстановленный паттерн с правильным масштабом и прозрачностью */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 250px;
            opacity: 0.08; 
            z-index: 0;
            pointer-events: none;
        }

        /* Шапка с выбором языка */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
            position: relative;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 6px 12px;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        /* Основной контент */
        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px 40px 20px;
        }

        /* Логотип */
        .logo {
            width: 260px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 0 rgba(0,0,0,0.2));
        }

        /* Заголовок (тонкая обводка + аккуратная тень, как в оригинале) */
        .title {
            font-size: 24px;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            color: #ffffff;
            -webkit-text-stroke: 1.2px #000000;
            text-shadow: 0px 2px 0px #000000, 0px 3px 0px #000000;
        }

        /* Идеальная кнопка (убрана огромная черная тень, добавлены блики и правильный скос) */
        .claim-button {
            width: 90%;
            background-color: var(--btn-yellow);
            border: 2px solid #000000;
            border-radius: 6px;
            padding: 14px 10px;
            font-family: 'Lilita One', cursive;
            font-size: 22px;
            color: white;
            cursor: pointer;
            position: relative;
            margin-bottom: 40px;
            transform: skewX(-3deg);
            
            /* Блик сверху, затемнение снизу, аккуратная черная тень снаружи */
            box-shadow: 
                inset 0 -4px 0 rgba(204, 130, 0, 0.8), 
                inset 0 2px 0 rgba(255, 255, 255, 0.5), 
                0 4px 0 #000000;
                
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .claim-button span {
            display: block;
            transform: skewX(3deg);
            letter-spacing: 0.5px;
            -webkit-text-stroke: 1px #000000;
            text-shadow: 0px 2px 0px #000000;
        }

        .claim-button:active {
            transform: skewX(-3deg) translateY(2px);
            box-shadow: 
                inset 0 -2px 0 rgba(204, 130, 0, 0.8), 
                inset 0 2px 0 rgba(255, 255, 255, 0.5), 
                0 2px 0 #000000;
        }

        /* Текст над Google Play */
        .download-label {
            font-size: 20px;
            margin-bottom: 12px;
            color: #ffffff;
            -webkit-text-stroke: 1px #000000;
            text-shadow: 0px 2px 0px #000000, 0px 3px 0px #000000;
        }

        /* Кнопка Google Play */
        .gp-link {
            display: inline-block;
            transition: transform 0.1s;
        }

        .gp-link:active {
            transform: scale(0.95);
        }

        .gp-link img {
            height: 55px;
            width: auto;
        }

        /* Подвал */
        .footer {
            background: #000000;
            width: 100%;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 25px;
            position: relative;
            z-index: 10;
            margin-top: auto;
        }

        .footer-item {
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            opacity: 0.8;
        }

        .footer-item:hover {
            text-decoration: underline;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            русский
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
    </div>

    <div class="main-content">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars Logo" class="logo">

        <div class="title">
            Получите награду в Brawl<br>Stars!
        </div>

        <button class="claim-button">
            <span>Получить награду</span>
        </button>

        <div class="download-label">Скачать Brawl Stars</div>
        
        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="СКАЧАТЬ ИЗ Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#" class="footer-item">Справочник<br>для</a>
        <a href="#" class="footer-item">Условия<br>пользования</a>
        <a href="#" class="footer-item">Политика<br>конфиденциальности</a>
    </div>

</body>
  </html>
