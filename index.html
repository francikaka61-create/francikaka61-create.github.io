<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #2a73ff;
            --bs-yellow: #ffce00;
            --bs-dark-yellow: #c69e00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Lilita One', cursive;
            background-color: var(--bs-blue);
            /* Паттерн с иконками на фоне */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Верхняя панель */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        .lang-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Контент */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding-bottom: 50px;
        }

        /* Логотип по твоей ссылке */
        .logo {
            width: 280px;
            margin-bottom: 40px;
            filter: drop-shadow(0 5px 0px rgba(0,0,0,0.2));
        }

        /* Заголовок с обводкой как в игре */
        h1 {
            font-size: 26px;
            line-height: 1.2;
            margin-bottom: 30px;
            text-transform: none;
            /* Эффект обводки */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  4px 0px rgba(0,0,0,0.3);
        }

        /* Желтая кнопка "Получить награду" */
        .btn-main {
            background: var(--bs-yellow);
            color: white;
            text-decoration: none;
            font-size: 24px;
            padding: 18px 0;
            width: 100%;
            border-radius: 12px;
            border: 4px solid black;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.3);
            /* Текст внутри кнопки тоже с обводкой */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            margin-bottom: 60px;
            transition: transform 0.05s;
        }

        .btn-main:active {
            transform: translateY(3px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        .download-text {
            font-size: 22px;
            margin-bottom: 20px;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        /* Кнопка Google Play */
        .google-play-img {
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Футер */
        footer {
            background: #000;
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-size: 11px;
            text-align: center;
            max-width: 90px;
            font-family: sans-serif;
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-select">🌐 русский ⌵</div>
    </div>

    <div class="content">
        <img src="https://i.ibb.co/6R8mD8n/logo.png" alt="Brawl Stars" class="logo">

        <h1>Получите награду в Brawl Stars!</h1>

        <a href="#" class="btn-main">Получить награду</a>

        <div class="download-text">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Скачать из Google Play" class="google-play-img">
        </a>
    </div>

    <footer>
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </footer>

</body>
  </html>
