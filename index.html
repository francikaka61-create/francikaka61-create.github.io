<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #2167f2;
            --bs-yellow: #ffcc00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Lilita One', cursive;
            background-color: var(--bs-blue);
            /* Паттерн с иконками на фоне */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Верхняя панель */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 20px;
            box-sizing: border-box;
        }

        .lang-select {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        /* Контент */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding-bottom: 40px;
        }

        /* Твой логотип */
        .logo-container img {
            width: 280px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 6px 0px rgba(0,0,0,0.15));
        }

        /* Текст с экстремально жирной обводкой (Brawl Style) */
        h1 {
            font-size: 27px;
            line-height: 1.1;
            margin-bottom: 30px;
            text-transform: none;
            /* Сверхмощная обводка через многослойные тени */
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000,
                 0px  4px 0px rgba(0,0,0,0.4),
                 0px  6px 10px rgba(0,0,0,0.3);
        }

        /* Желтая кнопка "1 в 1" */
        .btn-reward {
            background: var(--bs-yellow);
            color: white;
            text-decoration: none;
            font-size: 24px;
            display: block;
            width: 100%;
            padding: 16px 0;
            border-radius: 12px;
            border: 4px solid black;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.2), 0 8px 0px rgba(0,0,0,0.1);
            /* Текст внутри кнопки тоже с обводкой */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
            margin-bottom: 55px;
            transition: transform 0.05s;
        }

        .btn-reward:active {
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        .download-label {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: -2.5px -2.5px 0 #000, 2.5px -2.5px 0 #000, -2.5px 2.5px 0 #000, 2.5px 2.5px 0 #000;
        }

        /* Кнопка Google Play */
        .gp-link img {
            width: 210px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Футер */
        footer {
            background: #000;
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-size: 10px;
            text-align: center;
            max-width: 90px;
            font-family: sans-serif;
            text-transform: uppercase;
            opacity: 0.8;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-select">🌐 русский ⌵</div>
    </div>

    <div class="content">
        <div class="logo-container">
            <a href="https://ibb.co/BHDZmxkB">
                <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars Logo" border="0">
            </a>
        </div>

        <h1>Получите награду в Brawl Stars!</h1>

        <a href="#" class="btn-reward">Получить награду</a>

        <div class="download-label">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Google Play">
        </a>
    </div>

    <footer>
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </footer>

</body>
                                              </html>
