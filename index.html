<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Lilita One',cursive;
    color:white;
    text-align:center;
    background: linear-gradient(180deg,#2f5fff,#3d6eff);
    overflow:hidden;
}

/* ФОН */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:url("https://cdn.brawlify.com/images/bg-stars.png");
    opacity:0.15;
}

/* ЯЗЫК */
.lang {
    position:absolute;
    right:15px;
    top:15px;
    padding:6px 14px;
    border-radius:20px;
    background:rgba(0,0,0,0.3);
    border:2px solid rgba(255,255,255,0.6);
}

/* КОНТЕНТ */
.wrap {
    margin-top:60px;
}

/* ЛОГО */
.logo {
    width:260px;
    pointer-events:none;
}

/* ТЕКСТ */
.title {
    font-size:26px;
    margin:25px;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

/* КНОПКА */
.btn {
    width:85%;
    margin:20px auto;
    padding:18px;
    font-size:24px;

    background:#ffcc00;
    border:5px solid #000;
    border-radius:16px;

    box-shadow:
    inset 0 -8px 0 rgba(0,0,0,0.3),
    0 8px 0 #000;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

.btn:active {
    transform:translateY(6px);
    box-shadow:
    inset 0 -4px 0 rgba(0,0,0,0.3),
    0 2px 0 #000;
}

/* ЛОАДЕР */
.loader {
    display:none;
    position:fixed;
    inset:0;
    background:#2f5fff;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.spinner {
    width:60px;
    height:60px;
    border:6px solid white;
    border-top:6px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    to { transform:rotate(360deg); }
}

.footer {
    position:absolute;
    bottom:0;
    width:100%;
    background:black;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:20px;
    font-size:10px;
}
</style>
</head>

<body>

<div class="lang">🌐 русский ⌄</div>

<div class="wrap" id="main">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/en/6/62/Brawl_Stars_logo.svg">

<div class="title">Получите награду в Brawl Stars!</div>

<div class="btn" onclick="startReward()">Получить награду</div>

</div>

<!-- ЛОАДЕР -->
<div class="loader" id="loader">
<div class="spinner"></div>
<div style="margin-top:20px;">Загрузка награды...</div>
</div>

<div class="footer">
<div>Справочник для родителей</div>
<div>Условия</div>
<div>Политика</div>
</div>

<script>
function startReward(){
    document.getElementById("main").style.display="none";
    document.getElementById("loader").style.display="flex";

    setTimeout(()=>{
        alert("Награда получена!");
        location.reload();
    },3000);
}
</script>

</body>
  </html>
