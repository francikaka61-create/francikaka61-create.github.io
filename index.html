<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Reward</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #1e64eb;
            --bs-yellow: #ffcc00;
            --bs-dark-yellow: #c69e00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Lilita One', cursive; /* Тот самый шрифт */
            background: var(--bs-blue);
            /* Паттерн на фоне (черепа и иконки) */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); 
            color: white;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Верхняя панель выбора языка */
        .header-lang {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
        }

        .lang-dropdown {
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* Логотип */
        .logo {
            width: 80%;
            max-width: 350px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            margin-bottom: 20px;
        }

        /* Заголовок с обводкой */
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  4px 0px rgba(0,0,0,0.5);
        }

        /* Кнопка "Получить награду" */
        .reward-button {
            background: var(--bs-yellow);
            color: white;
            text-decoration: none;
            font-size: 24px;
            padding: 15px 40px;
            border-radius: 12px;
            border: 4px solid black;
            box-shadow: inset 0 -6px 0 rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 0 #000;
            transition: transform 0.1s, background 0.2s;
            margin-bottom: 50px;
        }

        .reward-button:active {
            transform: scale(0.95) translateY(4px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
        }

        /* Блок Google Play */
        .download-label {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000;
        }

        .gp-link img {
            width: 200px;
            transition: transform 0.2s;
        }

        .gp-link:hover img {
            transform: scale(1.05);
        }

        /* Нижнее меню */
        footer {
            background: black;
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        footer a {
            color: #ccc;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            max-width: 100px;
            text-align: center;
            font-family: sans-serif; /* Для футера лучше обычный шрифт */
        }

        /* Адаптация под мелкие экраны */
        @media (max-width: 380px) {
            h1 { font-size: 22px; }
            .reward-button { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-lang">
        <div class="lang-dropdown">🌐 русский ⌵</div>
    </div>

    <div class="main-content">
        <img src="https://upload.wikimedia.org/wikipedia/en/b/b8/Brawl_Stars_logo.png" alt="Brawl Stars Logo" class="logo">

        <h1>ПОЛУЧИТЕ НАГРАДУ В BRAWL STARS!</h1>

        <a href="https://link.brawlstars.com/en?action=voucher&code=v4lue" class="reward-button">
            ПОЛУЧИТЬ НАГРАДУ
        </a>

        <div class="download-label">СКАЧАТЬ BRAWL STARS</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
        </a>
    </div>

    <footer>
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </footer>

</body>
</html>
