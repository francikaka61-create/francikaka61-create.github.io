<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Stars</title>

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
:root {
    --blue: #2f63f5;
    --yellow: #ffcc00;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Lilita One', cursive;
    background: var(--blue);
    color: white;
}

/* Фон как в оригинале */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
    opacity: 0.15;
    z-index: 0;
}

/* Верх */
.header {
    display: flex;
    justify-content: flex-end;
    padding: 14px;
    position: relative;
    z-index: 1;
}

.lang {
    background: rgba(0,0,0,0.35);
    border: 2px solid rgba(255,255,255,0.6);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
}

/* Центр */
.content {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 10px 20px 40px;
}

/* ЛОГО (НЕ КЛИКАБЕЛЬНО!) */
.logo img {
    width: 270px;
    margin: 20px 0;
    pointer-events: none; /* запрет клика */
}

/* Заголовок */
.title {
    font-size: 26px;
    line-height: 1.2;
    margin-bottom: 30px;

    text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000,
         0px 6px 0 rgba(0,0,0,0.35);
}

/* КНОПКА */
.btn {
    display: block;
    width: 100%;
    background: var(--yellow);
    color: white;
    text-decoration: none;
    padding: 18px 0;
    font-size: 24px;

    border: 5px solid #000;
    border-radius: 14px;

    box-shadow:
        inset 0 -8px 0 rgba(0,0,0,0.25),
        0 8px 0 #000;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;

    margin-bottom: 55px;
}

.btn:active {
    transform: translateY(6px);
    box-shadow:
        inset 0 -4px 0 rgba(0,0,0,0.25),
        0 2px 0 #000;
}

/* Скачать */
.download {
    font-size: 22px;
    margin-bottom: 15px;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
}

/* Google Play */
.gp img {
    width: 220px;
    border-radius: 6px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

/* Футер */
footer {
    background: #000;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 20px 10px;
}

footer a {
    color: white;
    text-decoration: none;
    font-size: 10px;
    font-family: sans-serif;
    text-transform: uppercase;
    opacity: 0.85;
    max-width: 90px;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">
    <div class="lang">🌐 русский ⌄</div>
</div>

<div class="content">

    <!-- УБРАЛ ССЫЛКУ -->
    <div class="logo">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp">
    </div>

    <div class="title">
        Получите награду в Brawl Stars!
    </div>

    <a href="#" class="btn">Получить награду</a>

    <div class="download">Скачать Brawl Stars</div>

    <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png">
    </a>

</div>

<footer>
    <a href="#">Справочник для родителей</a>
    <a href="#">Условия пользования</a>
    <a href="#">Политика конфиденциальности</a>
</footer>

</body>
</html>
