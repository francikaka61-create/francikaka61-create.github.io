<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Lilita One',cursive;
    background: linear-gradient(180deg,#2f5fff,#3d6eff);
    color:white;
}

/* ФОН */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://cdn.brawlify.com/images/bg-stars.png");
    opacity:0.12;
}

/* ВЕРХ */
.header{
    display:flex;
    justify-content:flex-end;
    padding:16px;
}

.lang{
    padding:6px 14px;
    border-radius:20px;
    background:rgba(0,0,0,0.3);
    border:2px solid rgba(255,255,255,0.6);
    font-size:14px;
}

/* ЦЕНТРАЛЬНЫЙ БЛОК */
.main{
    min-height:calc(100vh - 120px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

/* ЛОГО */
.logo{
    width:280px;
    margin-bottom:25px;
}

/* ТЕКСТ */
.title{
    font-size:26px;
    line-height:1.2;
    margin-bottom:35px;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

/* КНОПКА */
.btn{
    width:100%;
    max-width:340px;

    padding:18px;
    font-size:24px;

    background:#ffcc00;
    border:5px solid #000;
    border-radius:16px;

    box-shadow:
    inset 0 -8px 0 rgba(0,0,0,0.3),
    0 8px 0 #000;

    margin-bottom:60px;

    text-align:center;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

/* СКАЧАТЬ */
.download{
    font-size:22px;
    margin-bottom:15px;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

.gp{
    width:220px;
}

/* ФУТЕР */
.footer{
    background:#000;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.footer div{
    font-size:10px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="header">
    <div class="lang">🌐 русский ⌄</div>
</div>

<div class="main">

<!-- ВАЖНО: нормальная ссылка на логотип -->
<img class="logo" src="https://upload.wikimedia.org/wikipedia/en/6/62/Brawl_Stars_logo.svg">

<div class="title">
Получите награду в Brawl Stars!
</div>

<div class="btn">Получить награду</div>

<div class="download">Скачать Brawl Stars</div>

<img class="gp" src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png">

</div>

<div class="footer">
<div>Справочник для родителей</div>
<div>Условия пользования</div>
<div>Политика конфиденциальности</div>
</div>

</body>
</html>
