<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Получить награду</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        /* Общие настройки */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            /* Шрифт применяется ко всему телу документа */
            font-family: 'Lilita One', cursive, sans-serif;
            background: linear-gradient(180deg, #2f5fff 0%, #3d6eff 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Фоновый узор (иконки Brawl Stars) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://cdn.brawlify.com/images/bg-stars.png");
            background-size: 180px;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        /* Шапка */
        .header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            padding: 15px;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Контент */
        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Твой логотип из ссылки */
        .main-logo {
            width: 280px;
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
            /* Небольшая тень под логотипом для объема */
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* Заголовок с массивной обводкой */
        .main-title {
            font-size: 28px;
            line-height: 1.1;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000,
                 0px  5px 0 #000; /* Нижняя тень */
        }

        /* Кнопка "Получить" */
        .claim-button {
            width: 100%;
            max-width: 340px;
            background: #ffcc00;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 18px;
            font-family: 'Lilita One', cursive;
            font-size: 26px;
            color: white;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2), 0 8px 0 #000;
            cursor: pointer;
            margin-bottom: 50px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .claim-button:active {
            transform: translateY(4px);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 4px 0 #000;
        }

        /* Секция загрузки */
        .download-label {
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }

        .gp-button img {
            width: 210px;
            transition: transform 0.2s;
        }

        .gp-button:hover img {
            transform: scale(1.05);
        }

        /* Футер */
        .footer {
            position: relative;
            z-index: 1;
            background: #000;
            width: 100%;
            padding: 25px 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 11px;
            white-space: nowrap;
        }

        .footer a:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-selector">
            <span>🌐</span> русский <span>⌄</span>
        </div>
    </div>

    <div class="container">
        <img src="https://i.ibb.co/Y49k6Mgh/output.webp" alt="Brawl Stars Logo" class="main-logo">

        <div class="main-title">
            Получите награду в <br> Brawl Stars!
        </div>

        <button class="claim-button">Получить награду</button>

        <div class="download-label">Скачать Brawl Stars</div>

        <a href="https://play.google.com/store/apps/details?id=com.supercell.brawlstars" class="gp-button" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png" alt="Скачать в Google Play">
        </a>
    </div>

    <div class="footer">
        <a href="#">Справочник для родителей</a>
        <a href="#">Условия пользования</a>
        <a href="#">Политика конфиденциальности</a>
    </div>

</body>
</html>
